services:
  backend:
    build:
      context: ../backend
    env_file:
      - ../.env.production
    environment:
      APP_ENV: production
      DATA_DIR: /app/local-data
    expose:
      - "8000"
    volumes:
      - backend_data:/app/local-data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ../frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    restart: unless-stopped

volumes:
  backend_data:
